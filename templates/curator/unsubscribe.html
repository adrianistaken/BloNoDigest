{% extends "curator/public_base.html" %}

{% block title %}Unsubscribed — BloNo Digest{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-5 pt-20 pb-10 text-center">
  <h1 class="font-display font-black text-4xl mt-4">You're unsubscribed.</h1>
  <p class="mt-4 text-lg text-[color:var(--ink-soft)] max-w-xl mx-auto">
    {{ subscriber.email }} won't receive the Thursday digest anymore.
    Change your mind? You can sign up again any time.
  </p>
  <a href="/" class="btn-primary inline-block mt-8 px-6 py-3 rounded-md font-bold">Back to the front page</a>
</section>
{% endblock %}
